name: tugas1mobile
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  hijri: ^3.0.0      # Pastikan sejajar di bawah flutter
  intl: ^0.18.1     # Pastikan sejajar di bawah flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Pastikan 'assets' di bawah ini sejajar dengan uses-material-design (masuk 2 spasi)
  assets:
    - assets/images/danang.jpeg
    - assets/images/gorga.jpeg
    - assets/images/jepe.jpeg
    - assets/images/vano.jpeg